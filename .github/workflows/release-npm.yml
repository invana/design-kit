name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to create the GitHub Release
      id-token: write # required for npm provenance (remove if you disable provenance below)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build publishable packages
        # Only build packages/* — the Storybook app (apps/*) is not published and
        # its build is not part of the release.
        run: pnpm exec turbo run build --filter="./packages/*"

      - name: Publish to npm
        # --no-git-checks: the tag is checked out in detached HEAD, which pnpm
        # would otherwise reject. workspace:* deps are rewritten automatically.
        run: pnpm -r publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Provenance links the published package to this workflow run for
          # supply-chain trust. If it ever fails, remove this line and the
          # `id-token: write` permission above.
          NPM_CONFIG_PROVENANCE: true

      - name: Create GitHub Release
        # Auto-generates release notes from commits/PRs since the previous v* tag.
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
