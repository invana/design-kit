name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to create the GitHub Release
      id-token: write # required for OIDC trusted publishing (no NPM_TOKEN needed)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        # No registry-url here on purpose: setup-node would write an .npmrc with
        # a `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}` line, and that
        # placeholder breaks OIDC auth. Trusted publishing needs no token .npmrc.
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build publishable packages
        # Only build packages/* — the Storybook app (apps/*) is not published and
        # its build is not part of the release.
        run: pnpm exec turbo run build --filter="./packages/*"

      - name: Publish to npm via OIDC trusted publishing
        # No NODE_AUTH_TOKEN: pnpm detects the GitHub Actions OIDC environment
        # (via id-token: write) and exchanges a short-lived token automatically,
        # provided each package is registered as a trusted publisher on npmjs.com.
        # Trusted publishing emits provenance on its own; NPM_CONFIG_PROVENANCE
        # stays for clarity. --no-git-checks: the tag is a detached HEAD, which
        # pnpm would otherwise reject. workspace:* deps are rewritten on publish.
        run: pnpm -r publish --access public --no-git-checks
        env:
          NPM_CONFIG_PROVENANCE: true

      - name: Create GitHub Release
        # Auto-generates release notes from commits/PRs since the previous v* tag.
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
