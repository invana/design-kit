# git-cliff configuration — generates CHANGELOG.md from conventional commits.
#
# All @invana/* packages are versioned in lockstep, so this produces a single
# root changelog with one dated section per `vX` tag. Driven from release.sh
# (which commits the version bump being cut) and from
# .github/workflows/release.yml (which extracts the latest section for the
# GitHub Release body).
#
# To change what appears in the changelog, edit `commit_parsers` below — that
# is the single source of truth for type → section mapping and skips.

[changelog]
header = """
# Changelog

All notable changes to the `@invana/*` packages (lockstep versioned).
This file is generated by [git-cliff](https://git-cliff.org) on each release.

"""
# Tera template. One `## [version] - date` section per tag, commits grouped by
# the `group` assigned in `commit_parsers`, bullets carry an optional **(scope)**.
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}\
- {% if commit.scope %}**({{ commit.scope }})** {% endif %}{{ commit.message | upper_first }}
{% endfor %}\
{% endfor %}\n
"""
trim = true
footer = ""

[git]
conventional_commits = true
# Drop commits that aren't conventional (merge commits, ad-hoc messages) so the
# changelog stays clean.
filter_unconventional = true
split_commits = false
# Only commits whose type matches a parser below survive (others are skipped).
filter_commits = true
# Recognise our version tags; ignore anything else.
tag_pattern = "v[0-9].*"
sort_commits = "oldest"
# Type → changelog section. First match wins; `skip = true` omits the commit.
# The `<!-- N -->` prefix controls section order (git-cliff sorts groups by the
# raw string); `striptags` removes it before rendering. Lower N appears first.
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->Features" },
  { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
  { message = "^perf", group = "<!-- 2 -->Performance" },
  { message = "^refactor", group = "<!-- 3 -->Refactors" },
  { message = "^docs", group = "<!-- 4 -->Documentation" },
  { message = "^release", skip = true },
  { message = "^chore", skip = true },
  { message = "^ci", skip = true },
  { message = "^build", skip = true },
  { message = "^test", skip = true },
  { message = "^style", skip = true },
]
protect_breaking_commits = false
